<svg width="600" height="450" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <rect x="100" y="40" width="400" height="200" rx="12" fill="#1a1a1a" />
  <rect x="210" y="65" width="180" height="110" rx="4" fill="white" />
  
